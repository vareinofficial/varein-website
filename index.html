
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAREIN</title>
<style>
body{margin:0;background:#0b0b0b;color:white;font-family:Arial,sans-serif}
nav{display:flex;justify-content:space-between;padding:24px 8%;border-bottom:1px solid #222}
.hero{height:90vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.hero h1{font-size:72px;letter-spacing:8px}
.hero p{color:#d0d0d0;max-width:600px}
.btn{background:white;color:black;padding:14px 28px;text-decoration:none;border-radius:999px}
.section{padding:80px 8%}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.card{background:#161616;padding:20px;border-radius:14px}
footer{text-align:center;padding:40px;border-top:1px solid #222}
</style>
</head>
<body>
<nav><strong>VAREIN</strong><span>Modern Luxury</span></nav>
<div class="hero">
<img src="logo.png" alt="VAREIN Logo" style="width:180px;margin-bottom:30px;">
<h1>VAREIN</h1>
<p>Crafted Beyond Ordinary. Premium accessories for modern gentlemen.</p>
<a class="btn" href="#">Shop Collection</a>
</div>
<div class="section">
<h2>Featured Collection</h2>
<div class="grid">
<div class="card">Signature Wallet</div>
<div class="card">Core Card Holder</div>
<div class="card">Noir Sunglasses</div>
<div class="card">Heritage Bracelet</div>
</div>
</div>
<footer>© VAREIN</footer>
</body>
</html>
